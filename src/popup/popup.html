<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <title>TrackPull</title>
  <style>
    /* Dark mode tokens -- keep in sync with options.html */
    :root {
      color-scheme: light dark;

      --color-bg:                 #ffffff;
      --color-bg-surface:         #f5f5f5;
      --color-bg-card:            #ffffff;
      --color-bg-subtle:          #f9f9f9;
      --color-text-primary:       #1a1a1a;
      --color-text-body:          #333333;
      --color-text-muted:         #666666;
      --color-text-label:         #555555;
      --color-accent:             #1976d2;
      --color-accent-hover:       #1565c0;
      --color-accent-light:       rgba(25, 118, 210, 0.08);
      --color-border:             #e0e0e0;
      --color-disabled:           #bdbdbd;
      --color-danger:             #f44336;
      --color-danger-hover:       #d32f2f;
      --color-status-ok:          #388e3c;
      --color-status-error:       #d32f2f;
      --color-toast-ok-bg:        #388e3c;
      --color-toast-err-bg:       #d32f2f;
      --color-icon-hover-bg:      #f0f0f0;
      --color-text-on-accent:     #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:                 #121212;
        --color-bg-surface:         #1e1e1e;
        --color-bg-card:            #2a2a2a;
        --color-bg-subtle:          #242424;
        --color-text-primary:       #e8e8e8;
        --color-text-body:          #cccccc;
        --color-text-muted:         #999999;
        --color-text-label:         #aaaaaa;
        --color-accent:             #64b5f6;
        --color-accent-hover:       #90caf9;
        --color-accent-light:       rgba(100, 181, 246, 0.12);
        --color-border:             #404040;
        --color-disabled:           #666666;
        --color-danger:             #ef5350;
        --color-danger-hover:       #e53935;
        --color-status-ok:          #66bb6a;
        --color-status-error:       #ef9a9a;
        --color-toast-ok-bg:        #2e7d32;
        --color-toast-err-bg:       #c62828;
        --color-icon-hover-bg:      #333333;
        --color-text-on-accent:     #ffffff;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
      padding: 16px;
      min-width: 320px;
      background-color: var(--color-bg);
      color: var(--color-text-body);
    }

    h1 {
      font-size: 18px;
      margin-bottom: 12px;
      color: var(--color-text-primary);
    }

    p {
      font-size: 14px;
      line-height: 1.5;
      color: var(--color-text-muted);
    }
    .shot-count-container {
      margin: 20px 0;
      padding: 15px;
      background-color: var(--color-bg-surface);
      border-radius: 8px;
      text-align: center;
    }

    .shot-count {
      font-size: 48px;
      font-weight: bold;
      color: var(--color-accent);
      margin-top: 10px;
    }

    /* Empty state guidance — hidden by default, shown via .empty-state class on container */
    #empty-guidance {
      display: none;
    }

    #shot-count-container.empty-state #empty-guidance {
      display: block;
    }

    #shot-count-container.empty-state #shot-count {
      display: none;
    }

    #shot-count-container.empty-state #shot-count-heading {
      display: none;
    }

    .empty-guidance-primary {
      font-size: 16px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin: 0 0 6px 0;
      line-height: 1.4;
    }

    .empty-guidance-hint {
      font-size: 13px;
      color: var(--color-text-muted);
      margin: 0;
      line-height: 1.4;
    }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-on-accent);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
    }

    .toast.error {
      background-color: var(--color-toast-err-bg);
    }

    .toast.success {
      background-color: var(--color-toast-ok-bg);
    }

    @keyframes slideIn {
      from {
        top: -60px;
        opacity: 0;
      }
      to {
        top: 20px;
        opacity: 1;
      }
    }

    .toast.hiding {
      animation: slideOut 0.3s ease-in forwards;
    }

    @keyframes slideOut {
      from {
        top: 20px;
        opacity: 1;
      }
      to {
        top: -60px;
        opacity: 0;
      }
    }

    #status-message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 4px;
      font-size: 14px;
    }

    #status-message.status-error   { color: var(--color-status-error); }
    #status-message.status-success { color: var(--color-status-ok); }

    #clear-btn {
      width: 100%;
      padding: 12px;
      color: var(--color-text-on-accent);
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
    }

    #export-btn:disabled, #clear-btn:disabled {
      background-color: var(--color-disabled);
      cursor: not-allowed;
    }

    #clear-btn {
      background-color: var(--color-danger);
    }

    #clear-btn:hover:not(:disabled) {
      background-color: var(--color-danger-hover);
    }

    /* Unit selector dropdowns */
    .unit-selectors {
      display: flex;
      gap: 12px;
      margin: 16px 0;
    }

    .unit-selectors .unit-group {
      flex: 1;
    }

    .unit-selectors label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }

    .unit-selectors select {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--color-accent);
      border-radius: 6px;
      background: var(--color-bg-card);
      color: var(--color-text-body);
      font-size: 13px;
      cursor: pointer;
    }

    .unit-selectors select:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: -1px;
    }

    /* Section dividers */
    .ai-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--color-border);
    }

    .ai-section h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-text-primary);
      margin: 0 0 12px 0;
    }

    /* Export row: side-by-side buttons */
    .export-row {
      display: flex;
      gap: 8px;
      margin-top: 15px;
    }

    .export-row button {
      flex: 1;
      min-width: 0;
      padding: 12px;
      color: var(--color-text-on-accent);
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      background-color: var(--color-accent);
    }

    .export-row button:hover {
      background-color: var(--color-accent-hover);
    }

    .export-row button:disabled {
      background-color: var(--color-disabled);
      cursor: not-allowed;
    }

    /* AI controls: prompt and service dropdowns */
    .ai-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }

    .ai-group {
      width: 100%;
    }

    .ai-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }

    .ai-group select {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--color-accent);
      border-radius: 6px;
      background: var(--color-bg-card);
      color: var(--color-text-body);
      font-size: 13px;
      cursor: pointer;
    }

    .ai-group select:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: -1px;
    }

    /* AI action buttons */
    .ai-actions {
      display: flex;
      gap: 8px;
    }

    .btn-primary {
      flex: 1;
      min-width: 0;
      padding: 12px;
      color: var(--color-text-on-accent);
      background-color: var(--color-accent);
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-primary:hover {
      background-color: var(--color-accent-hover);
    }

    .btn-outline {
      flex: 1;
      min-width: 0;
      padding: 12px;
      color: var(--color-accent);
      background-color: transparent;
      border: 2px solid var(--color-accent);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-outline:hover {
      background-color: var(--color-accent-light);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--color-text-muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .icon-btn:hover {
      background-color: var(--color-icon-hover-bg);
      color: var(--color-accent);
    }
  </style>
  <script src="./popup.js"></script>
</head>
<body>
  <div class="header-row">
    <h1>TrackPull</h1>
    <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
      &#9881;
    </button>
  </div>
  <div id="shot-count-container">
    <h2 id="shot-count-heading">Shot Count</h2>
    <div id="shot-count" class="shot-count">Loading...</div>
    <div id="empty-guidance">
      <p class="empty-guidance-primary">Open a Trackman report to capture shots</p>
      <p class="empty-guidance-hint">Shot data is captured automatically when you view a report</p>
    </div>
  </div>
  <div class="unit-selectors">
    <div class="unit-group">
      <label for="speed-unit">Speed</label>
      <select id="speed-unit">
        <option value="mph">mph</option>
        <option value="m/s">m/s</option>
      </select>
    </div>
    <div class="unit-group">
      <label for="distance-unit">Distance</label>
      <select id="distance-unit">
        <option value="yards">yards</option>
        <option value="meters">meters</option>
      </select>
    </div>
    <div class="unit-group">
      <label for="surface-select">Surface</label>
      <select id="surface-select">
        <option value="Mat">Mat</option>
        <option value="Grass">Grass</option>
      </select>
    </div>
  </div>
  <div id="export-row" class="export-row" style="display:none;">
    <button id="export-btn">Export CSV</button>
    <button id="copy-tsv-btn">Copy TSV</button>
  </div>
  <div id="ai-section" class="ai-section" style="display:none;">
    <h2>AI Analysis</h2>
    <div class="ai-controls">
      <div class="ai-group">
        <label for="prompt-select">Prompt</label>
        <select id="prompt-select"></select>
      </div>
      <div class="ai-group">
        <label for="ai-service-select">AI Service</label>
        <select id="ai-service-select">
          <option value="ChatGPT">ChatGPT</option>
          <option value="Claude">Claude</option>
          <option value="Gemini">Gemini</option>
        </select>
      </div>
    </div>
    <div class="ai-actions">
      <button id="open-ai-btn" class="btn-primary">Open in AI</button>
      <button id="copy-prompt-btn" class="btn-outline">Copy Prompt + Data</button>
    </div>
  </div>
  <button id="clear-btn" style="display:none">Clear Session Data</button>
  <div id="status-message"></div>
  <div id="toast-container" style="position: fixed; top: 0; left: 0; right: 0; z-index: 1000;"></div>
</body>
</html>
